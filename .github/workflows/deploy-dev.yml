name: Deploy Dev

on:
  push:
    branches: [develop]
    paths:
      - 'api/**'
      - 'shared/**'
      - 'services/**'
      - 'Dockerfile'
      - 'requirements.txt'
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: ${{ secrets.AWS_REGION }}
  ECR_REGISTRY: ${{ secrets.ECR_REGISTRY }}
  ECR_REPOSITORY: ${{ secrets.ECR_REPOSITORY }}
  ECS_CLUSTER: ${{ secrets.ECS_CLUSTER }}
  ECS_SERVICE: ${{ secrets.ECS_SERVICE }}

jobs:
  build-and-push:
    name: Build & Push ECR
    runs-on: ubuntu-latest
    environment: dev
    outputs:
      image: ${{ steps.build.outputs.image }}

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login to ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build, tag, push image
        id: build
        run: |
          IMAGE_TAG=dev-${{ github.sha }}
          FULL_IMAGE=${{ env.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY }}:$IMAGE_TAG
          LATEST_IMAGE=${{ env.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY }}:dev-latest
          docker build -t $FULL_IMAGE -t $LATEST_IMAGE .
          docker push $FULL_IMAGE
          docker push $LATEST_IMAGE
          echo "image=$FULL_IMAGE" >> $GITHUB_OUTPUT

  deploy:
    name: Deploy to ECS Dev
    runs-on: ubuntu-latest
    environment: dev
    needs: build-and-push

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Scale up ECS
        run: |
          aws ecs update-service \
            --cluster ${{ env.ECS_CLUSTER }} \
            --service ${{ env.ECS_SERVICE }} \
            --desired-count 1 \
            --region ${{ env.AWS_REGION }}

      - name: Update task definition with new image
        id: task-def
        run: |
          # Get current task def (revision with secrets)
          aws ecs describe-task-definition \
            --task-definition ${{ env.ECS_SERVICE }} \
            --region ${{ env.AWS_REGION }} \
            --query 'taskDefinition' \
            --output json > /tmp/current_td.json

          # Update image
          NEW_IMAGE="${{ env.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY }}:dev-${{ github.sha }}"
          cat /tmp/current_td.json | \
            python3 -c "
import json, sys
td = json.load(sys.stdin)
import os
td['containerDefinitions'][0]['image'] = os.environ['NEW_IMAGE']
for f in ['taskDefinitionArn','revision','status','requiresAttributes','placementConstraints','compatibilities','registeredAt','registeredBy','deregisteredAt']:
    td.pop(f, None)
print(json.dumps(td))
" > /tmp/new_td.json
          env:
            NEW_IMAGE: ${{ env.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY }}:dev-${{ github.sha }}

          # Register new revision
          NEW_ARN=$(aws ecs register-task-definition \
            --cli-input-json file:///tmp/new_td.json \
            --region ${{ env.AWS_REGION }} \
            --query 'taskDefinition.taskDefinitionArn' \
            --output text)
          echo "task_arn=$NEW_ARN" >> $GITHUB_OUTPUT
          echo "Registered: $NEW_ARN"

      - name: Deploy to ECS
        run: |
          aws ecs update-service \
            --cluster ${{ env.ECS_CLUSTER }} \
            --service ${{ env.ECS_SERVICE }} \
            --task-definition ${{ steps.task-def.outputs.task_arn }} \
            --region ${{ env.AWS_REGION }}

      - name: Wait for deployment stable
        run: |
          aws ecs wait services-stable \
            --cluster ${{ env.ECS_CLUSTER }} \
            --services ${{ env.ECS_SERVICE }} \
            --region ${{ env.AWS_REGION }}
          echo "ECS service stable ✅"

      - name: Smoke test
        run: |
          sleep 10
          RESPONSE=$(curl -s -o /dev/null -w "%{http_code}" \
            https://api-cis.lumiguides.it.com/health)
          if [ "$RESPONSE" != "200" ]; then
            echo "Health check failed: HTTP $RESPONSE"
            exit 1
          fi
          echo "Health check passed ✅"
