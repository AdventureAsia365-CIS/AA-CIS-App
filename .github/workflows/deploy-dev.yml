name: Deploy Dev

on:
  push:
    branches: [develop]
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: ${{ secrets.AWS_REGION }}
  ECR_REGISTRY: ${{ secrets.ECR_REGISTRY }}
  ECR_REPOSITORY: ${{ secrets.ECR_REPOSITORY }}
  ECS_CLUSTER: ${{ secrets.ECS_CLUSTER }}
  ECS_SERVICE: ${{ secrets.ECS_SERVICE }}

jobs:
  build-and-push:
    name: Build & Push ECR
    runs-on: ubuntu-latest
    environment: dev
    outputs:
      image: ${{ steps.build.outputs.image }}

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login to ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build, tag, push image
        id: build
        run: |
          IMAGE_TAG=dev-${{ github.sha }}
          FULL_IMAGE=${{ env.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY }}:$IMAGE_TAG
          LATEST_IMAGE=${{ env.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY }}:dev-latest

          docker build -t $FULL_IMAGE -t $LATEST_IMAGE .
          docker push $FULL_IMAGE
          docker push $LATEST_IMAGE

          echo "image=$FULL_IMAGE" >> $GITHUB_OUTPUT
          echo "Built and pushed: $FULL_IMAGE"

  deploy:
    name: Deploy to ECS Dev
    runs-on: ubuntu-latest
    environment: dev
    needs: build-and-push

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Scale up ECS (ensure running)
        run: |
          aws ecs update-service \
            --cluster ${{ env.ECS_CLUSTER }} \
            --service ${{ env.ECS_SERVICE }} \
            --desired-count 1 \
            --region ${{ env.AWS_REGION }}

      - name: Force new ECS deployment
        run: |
          aws ecs update-service \
            --cluster ${{ env.ECS_CLUSTER }} \
            --service ${{ env.ECS_SERVICE }} \
            --force-new-deployment \
            --region ${{ env.AWS_REGION }}

      - name: Wait for deployment stable
        run: |
          echo "Waiting for ECS service to stabilize..."
          aws ecs wait services-stable \
            --cluster ${{ env.ECS_CLUSTER }} \
            --services ${{ env.ECS_SERVICE }} \
            --region ${{ env.AWS_REGION }}
          echo "ECS service stable ✅"

      - name: Smoke test
        run: |
          sleep 10
          RESPONSE=$(curl -s -o /dev/null -w "%{http_code}" \
            https://api-cis.lumiguides.it.com/health)
          if [ "$RESPONSE" != "200" ]; then
            echo "Health check failed: HTTP $RESPONSE"
            exit 1
          fi
          echo "Health check passed: HTTP $RESPONSE ✅"

      - name: Print deployed image
        run: |
          echo "Deployed image: ${{ needs.build-and-push.outputs.image }}"
          echo "API: https://api-cis.lumiguides.it.com"
