name: Deploy Dev

on:
  push:
    branches: [develop]
    paths:
      - 'api/**'
      - 'shared/**'
      - 'services/**'
      - 'Dockerfile'
      - 'requirements.txt'
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: ${{ secrets.AWS_REGION }}
  ECR_REGISTRY: ${{ secrets.ECR_REGISTRY }}
  ECR_REPOSITORY: ${{ secrets.ECR_REPOSITORY }}
  ECS_CLUSTER: ${{ secrets.ECS_CLUSTER }}
  ECS_SERVICE: ${{ secrets.ECS_SERVICE }}

jobs:
  build-and-push:
    name: Build & Push ECR
    runs-on: ubuntu-latest
    environment: dev
    outputs:
      image: ${{ steps.build.outputs.image }}

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login to ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build, tag, push image
        id: build
        run: |
          IMAGE_TAG=dev-${{ github.sha }}
          FULL_IMAGE=${{ env.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY }}:$IMAGE_TAG
          LATEST_IMAGE=${{ env.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY }}:dev-latest

          docker build -t $FULL_IMAGE -t $LATEST_IMAGE .
          docker push $FULL_IMAGE
          docker push $LATEST_IMAGE

          echo "image=$FULL_IMAGE" >> $GITHUB_OUTPUT
          echo "Built and pushed: $FULL_IMAGE"

  deploy:
    name: Deploy to ECS Dev
    runs-on: ubuntu-latest
    environment: dev
    needs: build-and-push

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Scale up ECS (ensure running)
        run: |
          aws ecs update-service \
            --cluster ${{ env.ECS_CLUSTER }} \
            --service ${{ env.ECS_SERVICE }} \
            --desired-count 1 \
            --region ${{ env.AWS_REGION }}

      - name: Register new task definition with secrets
        id: task-def
        run: |
          # Get current task def
          CURRENT_TD=$(aws ecs describe-task-definition \
            --task-definition ${{ env.ECS_SERVICE }} \
            --region ${{ env.AWS_REGION }} \
            --query 'taskDefinition' --output json)

          # Update image to new tag
          NEW_TD=$(echo $CURRENT_TD | python3 -c "
import json, sys
td = json.load(sys.stdin)
td['containerDefinitions'][0]['image'] = '${{ env.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY }}:dev-${{ github.sha }}'
for f in ['taskDefinitionArn','revision','status','requiresAttributes','placementConstraints','compatibilities','registeredAt','registeredBy','deregisteredAt']:
    td.pop(f, None)
print(json.dumps(td))
")

          # Register new revision
          NEW_REV=$(aws ecs register-task-definition \
            --cli-input-json "$NEW_TD" \
            --region ${{ env.AWS_REGION }} \
            --query 'taskDefinition.taskDefinitionArn' --output text)

          echo "task_def_arn=$NEW_REV" >> $GITHUB_OUTPUT
          echo "Registered: $NEW_REV"

      - name: Deploy new task definition
        run: |
          aws ecs update-service \
            --cluster ${{ env.ECS_CLUSTER }} \
            --service ${{ env.ECS_SERVICE }} \
            --task-definition ${{ steps.task-def.outputs.task_def_arn }} \
            --region ${{ env.AWS_REGION }}

      - name: Wait for deployment stable
        run: |
          echo "Waiting for ECS service to stabilize..."
          aws ecs wait services-stable \
            --cluster ${{ env.ECS_CLUSTER }} \
            --services ${{ env.ECS_SERVICE }} \
            --region ${{ env.AWS_REGION }}
          echo "ECS service stable ✅"

      - name: Smoke test
        run: |
          sleep 10
          RESPONSE=$(curl -s -o /dev/null -w "%{http_code}" \
            https://api-cis.lumiguides.it.com/health)
          if [ "$RESPONSE" != "200" ]; then
            echo "Health check failed: HTTP $RESPONSE"
            exit 1
          fi
          echo "Health check passed: HTTP $RESPONSE ✅"

      - name: Print deployed image
        run: |
          echo "Deployed image: ${{ needs.build-and-push.outputs.image }}"
          echo "API: https://api-cis.lumiguides.it.com"
