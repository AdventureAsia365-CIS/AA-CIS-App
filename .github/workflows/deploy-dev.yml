name: Deploy Dev
on:
  push:
    branches: [develop]
    paths:
      - 'api/**'
      - 'shared/**'
      - 'services/**'
      - 'Dockerfile'
      - 'requirements.txt'
      - 'frontend/**'
  workflow_dispatch:
permissions:
  id-token: write
  contents: read
env:
  AWS_REGION: ${{ secrets.AWS_REGION }}
  ECR_REGISTRY: ${{ secrets.ECR_REGISTRY }}
  ECR_REPOSITORY: ${{ secrets.ECR_REPOSITORY }}
  ECS_CLUSTER: ${{ secrets.ECS_CLUSTER }}
  ECS_SERVICE: ${{ secrets.ECS_SERVICE }}
jobs:
  build-and-push:
    name: Build and Push ECR
    runs-on: ubuntu-latest
    environment: dev
    outputs:
      image: ${{ steps.build.outputs.image }}
    steps:
      - uses: actions/checkout@v4
      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION }}
      - name: Login to ECR
        uses: aws-actions/amazon-ecr-login@v2
      - name: Build, tag, push image
        id: build
        run: |
          IMAGE_TAG=dev-${{ github.sha }}
          FULL_IMAGE=${{ env.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY }}:$IMAGE_TAG
          LATEST=${{ env.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY }}:latest
          docker build -t $FULL_IMAGE -t $LATEST .
          docker push $FULL_IMAGE
          docker push $LATEST
          echo "image=$LATEST" >> $GITHUB_OUTPUT
  deploy:
    name: Deploy to ECS Dev
    runs-on: ubuntu-latest
    environment: dev
    needs: build-and-push
    steps:
      - uses: actions/checkout@v4
      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION }}
      - name: Install jq
        run: sudo apt-get install -y jq
      - name: Scale up ECS
        run: |
          aws ecs update-service \
            --cluster ${{ env.ECS_CLUSTER }} \
            --service ${{ env.ECS_SERVICE }} \
            --desired-count 1 \
            --region ${{ env.AWS_REGION }}
      - name: Register new task definition
        id: task-def
        run: |
          NEW_IMAGE="${{ env.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY }}:latest"
          aws ecs describe-task-definition \
            --task-definition ${{ env.ECS_SERVICE }} \
            --region ${{ env.AWS_REGION }} \
            --query 'taskDefinition' \
            --output json | \
          jq --arg img "$NEW_IMAGE" \
            'del(.taskDefinitionArn,.revision,.status,.requiresAttributes,.placementConstraints,.compatibilities,.registeredAt,.registeredBy,.deregisteredAt) | .containerDefinitions[0].image = $img' \
          > /tmp/new_td.json
          NEW_ARN=$(aws ecs register-task-definition \
            --cli-input-json file:///tmp/new_td.json \
            --region ${{ env.AWS_REGION }} \
            --query 'taskDefinition.taskDefinitionArn' \
            --output text)
          echo "task_arn=$NEW_ARN" >> $GITHUB_OUTPUT
          echo "Registered: $NEW_ARN"
      - name: Deploy to ECS
        run: |
          aws ecs update-service \
            --cluster ${{ env.ECS_CLUSTER }} \
            --service ${{ env.ECS_SERVICE }} \
            --task-definition ${{ steps.task-def.outputs.task_arn }} \
            --region ${{ env.AWS_REGION }}
      - name: Wait stable
        run: |
          aws ecs wait services-stable \
            --cluster ${{ env.ECS_CLUSTER }} \
            --services ${{ env.ECS_SERVICE }} \
            --region ${{ env.AWS_REGION }}
          echo "ECS deployment stable"
      - name: Smoke test
        run: |
          sleep 10
          HTTP=$(curl -s -o /dev/null -w "%{http_code}" https://api-cis.lumiguides.it.com/health)
          [ "$HTTP" = "200" ] && echo "Health check passed" || (echo "Health check failed: $HTTP" && exit 1)

  deploy-lambdas:
    name: Deploy Lambda Functions
    runs-on: ubuntu-latest
    environment: dev
    needs: build-and-push
    steps:
      - uses: actions/checkout@v4
      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION }}
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Package and deploy Lambdas
        run: |
          bash scripts/package_lambdas.sh
          for fn in ingestion seo validation export content; do
            ZIP="dist/lambdas/${fn}.zip"
            if [ -f "$ZIP" ]; then
              echo "Deploying $fn..."
              aws lambda update-function-code                 --function-name aa-cis-dev-${fn}                 --zip-file fileb://${ZIP}                 --region ${{ env.AWS_REGION }}                 --output text --query 'FunctionArn'
            fi
          done
          echo "Lambda deploy complete"

  deploy-vercel:
    name: Deploy Frontend to Vercel
    runs-on: ubuntu-latest
    needs: []
    if: always()
    steps:
      - name: Trigger Vercel deploy hook
        run: curl -X POST "${{ secrets.VERCEL_DEPLOY_HOOK }}"
