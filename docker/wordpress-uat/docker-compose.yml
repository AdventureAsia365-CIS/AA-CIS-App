version: '3.8'
services:
  wordpress:
    image: wordpress:6.5
    ports:
      - "8090:80"
    environment:
      WORDPRESS_DB_HOST: mysql
      WORDPRESS_DB_USER: wp
      WORDPRESS_DB_PASSWORD: wp_uat_pass
      WORDPRESS_DB_NAME: wordpress_uat
    depends_on:
      - mysql
  mysql:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: wordpress_uat
      MYSQL_USER: wp
      MYSQL_PASSWORD: wp_uat_pass
    volumes:
      - mysql_data:/var/lib/mysql
volumes:
  mysql_data:
